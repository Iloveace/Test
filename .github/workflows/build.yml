name: Cross-Platform C++ Build

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential wget

      - name: Show compiler version
        run: g++ --version

      - name: Build
        run: make TARGET=Test

      - name: Download AppImage tool
        run: |
          wget -O appimagetool.AppImage \
            https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool.AppImage

      - name: Create AppDir structure
        run: |
          mkdir -p AppDir/usr/bin

          cp Test AppDir/usr/bin/Test
          chmod +x AppDir/usr/bin/Test

          cat > AppDir/AppRun <<'EOF'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/Test" "$@"
          EOF
          chmod +x AppDir/AppRun

          cat > AppDir/Test.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=Test
          Exec=Test
          Icon=Test
          Categories=Utility;
          Terminal=true
          EOF

          echo 'iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mP8/x8AAwMCAO+aS1EAAAAASUVORK5CYII=' \
            | base64 -d > AppDir/Test.png

      - name: Create AppImage
        run: |
          ARCH=x86_64 ./appimagetool.AppImage --appimage-extract-and-run AppDir Test-x86_64.AppImage

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: Test-linux
          path: Test-x86_64.AppImage

  windows-build:
    runs-on: windows-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            make

      - name: Show compiler version
        shell: msys2 {0}
        run: g++ --version

      - name: Build
        shell: msys2 {0}
        run: make TARGET=Test.exe

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Test-windows
          path: Test.exe

  macos-build:
    runs-on: macos-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Show compiler version
        run: clang++ --version

      - name: Build
        run: make CXX=clang++ TARGET=Test

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Test-macos
          path: Test

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux-build, windows-build, macos-build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: Test-linux
          path: release-assets/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Test-windows
          path: release-assets/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Test-macos
          path: release-assets/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            release-assets/linux/Test-x86_64.AppImage
            release-assets/windows/Test.exe
            release-assets/macos/Test